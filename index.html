<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ご来店前カウンセリングシート｜RYOICHI HASHIMOTO</title>

  <!-- ===== CDN（バージョン固定） ===== -->
  <!-- React 18.3.1 -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel 7.29.2 -->
  <script src="https://unpkg.com/@babel/standalone@7.29.2/babel.min.js" crossorigin></script>
  <!-- Lucide Icons 0.468.0 -->
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js" crossorigin></script>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Noto Sans JP -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --base: #1a1a1a;
      --card: #2a2a2a;
      --border: #3a3a3a;
      --text: #f5f5f0;
      --gold: #c9a96e;
    }
    html, body {
      background-color: var(--base);
      color: var(--text);
      font-family: 'Noto Sans JP', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      margin: 0;
    }
    /* iOSの自動ズーム防止：入力は16px以上を強制（標準時1rem=16px・拡大時はそれ以上） */
    input, select, textarea {
      font-size: 1rem !important;
      font-family: inherit;
    }
    select option { color: #111; }
    /* ステップ切替のフェード */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-step { animation: fadeUp .28s ease both; }
    ::placeholder { color: #8a8a82; }
    /* スクロールバー控えめ */
    ::-webkit-scrollbar { width: 0; height: 0; }
    /* 文字サイズ切替（シャンプー診断と同方式：html基準サイズ×rem。zoomはiOS実機で効かなかったため廃止） */
    html[data-font-size="normal"] { font-size: 16px; }
    html[data-font-size="large"]  { font-size: 20px; }
    html[data-font-size="xlarge"] { font-size: 24px; }
    .fs-selector { display: flex; align-items: center; gap: 6px; margin-top: 12px; flex-wrap: wrap; }
    .fs-selector-lbl { font-size: 0.6875rem; color: #9a9a92; letter-spacing: .05em; margin-right: 2px; }
    .fs-btn { background: transparent; border: 1px solid #3a3a3a; color: #9a9a92; font-family: inherit; padding: 10px 16px; border-radius: 999px; cursor: pointer; transition: all .2s; line-height: 1; -webkit-tap-highlight-color: transparent; }
    .fs-btn-normal { font-size: 0.75rem; }
    .fs-btn-large  { font-size: 0.875rem; }
    .fs-btn-xlarge { font-size: 1rem; }
    .fs-btn.active { background: #c9a96e; border-color: #c9a96e; color: #1a1a1a; font-weight: 700; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    // ===== React destructuring（先頭固定・削除禁止） =====
    const { createElement: h, useRef, useEffect, useState } = React;

    // ====== カラー定数 ======
    const C = {
      base: '#1a1a1a',
      card: '#2a2a2a',
      border: '#3a3a3a',
      text: '#f5f5f0',
      gold: '#c9a96e',
      goldSoft: 'rgba(201,169,110,0.12)',
      muted: '#9a9a92',
    };

    // ====== 文字サイズ切替（シャンプー診断と同方式） ======
    const FONT_SIZE_KEY = 'counselingSheetFontSize';
    const FONT_SIZE_OPTIONS = [
      { key: 'normal', label: '標準', btnClass: 'fs-btn-normal' },
      { key: 'large',  label: '大',   btnClass: 'fs-btn-large' },
      { key: 'xlarge', label: '特大', btnClass: 'fs-btn-xlarge' },
    ];

    // ====== Lucideアイコン（Reactと衝突しない安全ラッパー） ======
    function Icon({ name, size = 20, color = 'currentColor', strokeWidth = 2, style = {} }) {
      const ref = useRef(null);
      useEffect(() => {
        if (ref.current && window.lucide) {
          ref.current.innerHTML = '<i data-lucide="' + name + '"></i>';
          window.lucide.createIcons({
            attrs: { width: size, height: size, 'stroke-width': strokeWidth },
          });
        }
      }, [name, size, strokeWidth]);
      return h('span', {
        ref,
        style: { display: 'inline-flex', alignItems: 'center', color, ...style },
      });
    }

    // ====== 質問選択肢の定義 ======
    const ALLERGY = [
      'とくになし',
      '頭皮が敏感（かゆくなりやすい・荒れやすい）',
      '金属アレルギーがある',
      '花粉症・アトピーなどアレルギー体質',
      'その他',
    ];
    const HISTORY = [
      'カラー（白髪染め含む）',
      'パーマ',
      '縮毛矯正',
      'ブリーチ・ハイライト',
      'トリートメント（美容室でのケア）',
      'とくになし',
    ];
    const SCALP = [
      'とくに気になることはない',
      'べたつきやすい',
      '乾燥・かゆみが気になる',
      'フケが出やすい',
      '臭いが気になる',
      '抜け毛が多い気がする',
    ];
    const HAIR = [
      'うねり・くせ毛',
      'パサつき・乾燥',
      'ボリュームが出すぎる',
      'ボリュームが出ない・ぺたんこ',
      'まとまりにくい',
      '白髪が気になる',
      'ダメージが気になる',
      'とくになし',
    ];
    const MENU = [
      'カット',
      'カラー（白髪染め）',
      'カラー（ファッションカラー）',
      'ハイライト',
      'パーマ',
      '縮毛矯正',
      'トリートメント',
      '髪質改善トリートメント',
      'その他',
    ];

    // ====== 髪の長さ（薬剤量・施術時間の目安／ロング料金の判断材料） ======
    const HAIR_LENGTH = [
      { label: 'ベリーショート', sub: '耳が見える' },
      { label: 'ショート', sub: '耳下〜アゴ下' },
      { label: 'ミディアム', sub: 'アゴ下〜肩' },
      { label: 'セミロング', sub: '肩〜胸' },
      { label: 'ロング', sub: '胸より下' },
    ];

    // 排他（「とくになし」系）の値
    const NONE = {
      allergy: 'とくになし',
      history: 'とくになし',
      scalp: 'とくに気になることはない',
      hairConcern: 'とくになし',
      colorHistory: 'わからない',
      interimChange: 'とくになし（前回から変わりありません）',
    };

    // ====== カラー深掘り（薬剤の事前発注用） ======
    // カラー系メニューを選んだ人にだけ、追加で色の希望を伺う。全問「おまかせ／わからない」付き。
    const COLOR_MENUS = ['カラー（白髪染め）', 'カラー（ファッションカラー）', 'ハイライト'];
    // 「染める範囲」を最初に聞き、リタッチ（根元だけ）の場合は既存色に合わせるため「なりたい色」「明るさ」をスキップする
    const RETOUCH = '根元だけ（伸びた部分・リタッチ）';
    const COLOR_STEPS = ['colorRange', 'colorTone', 'colorBright', 'colorGray', 'colorHistory', 'colorSafety'];

    const COLOR_TONE = [
      'ベージュ系（やわらかい印象）',
      'アッシュ・透明感（くすみ・寒色）',
      'ピンク・レッド（あたたかい暖色）',
      'マット（落ち着いた緑み）',
      'ナチュラルブラウン（自然な茶色）',
      'とにかく明るくしたい',
      '暗く・落ち着かせたい',
      'おまかせ',
    ];
    const COLOR_BRIGHT = [
      '今より明るくしたい',
      '今くらいでいい',
      '今より暗くしたい',
      'わからない・おまかせ',
    ];
    const COLOR_GRAY = [
      '白髪は気にならない',
      '少しある（生え際・分け目など部分的）',
      '全体的に気になる',
      'しっかり染めたい',
    ];
    const COLOR_RANGE = [
      RETOUCH,
      '髪全体',
      '毛先メイン（グラデ・ハイライトなど）',
      'わからない・おまかせ',
    ];
    const COLOR_HISTORY = [
      'ブリーチをしたことがある',
      '黒染めをしたことがある',
      '縮毛矯正・ストレートをしている',
      'ずっと地毛のまま',
      'わからない',
    ];
    const COLOR_SAFETY = [
      'これまで問題なかった',
      '少ししみたことがある',
      'かぶれ・腫れ・かゆみが出たことがある',
      'わからない',
    ];
    // 既存のお客様専用：前回来店から今回までの髪の変化（薬剤選定のヒント）
    const INTERIM_CHANGE = [
      '他のサロンで施術をした（カット・カラー・パーマなど）',
      '市販のカラー剤で自分で染めた（セルフカラー）',
      'その他（ヘナ・ブリーチ・トリートメントなど）',
      'とくになし（前回から変わりありません）',
    ];

    // ====== 流入経路（新規のお客様のみ・どこで知ったか） ======
    const SOURCE = [
      'Instagram',
      'YouTube（美容室を化学する）',
      'TikTok',
      'ご紹介（知人・お客様から）',
      'HotPepper Beauty',
      'Google検索・マップ',
      'その他',
    ];

    // ====== パーマ／縮毛矯正の深掘り（該当メニュー選択時のみ・簡易版1問ずつ） ======
    const PERM_FINISH = [
      'ゆるめ・自然な感じ',
      'しっかりカール',
      '毛先のニュアンスだけ',
      '根元のボリューム',
      'おまかせ',
    ];
    const STRAIGHT_RANGE = [
      '全体',
      '前髪・顔まわりだけ',
      '気になる部分だけ',
      'おまかせ',
    ];
    const QUALITY_FOCUS = [
      'うねり・くせを抑えたい',
      'ダメージ・傷みを補修したい',
      '広がりを抑えてまとまりたい',
      'ツヤ・手触りを出したい',
      'パサつき・乾燥をケアしたい',
      'おまかせ',
    ];

    // ====== ステップ構成（来店種別＋希望メニューで分岐） ======
    function getSteps(visitType, menu, colorRange) {
      const m = menu || [];
      let colorBlock = m.some((x) => COLOR_MENUS.includes(x)) ? COLOR_STEPS : [];
      // リタッチは既存色に合わせるため「なりたい色」「明るさ」は聞かない
      if (colorRange === RETOUCH) {
        colorBlock = colorBlock.filter((s) => s !== 'colorTone' && s !== 'colorBright');
      }
      const waveBlock = [];
      if (m.includes('パーマ')) waveBlock.push('permFinish');
      if (m.includes('縮毛矯正')) waveBlock.push('straightRange');
      if (m.includes('髪質改善トリートメント')) waveBlock.push('qualityFocus');
      if (visitType === 'existing') {
        // 既存のお客様は頭皮・髪質・カラー履歴を橋元さんが把握済みのため scalp / hairConcern / colorHistory は省略。
        // 代わりに「前回からの変化」（他店施術・セルフカラー）を聞く。
        const colorBlockExisting = colorBlock.filter((s) => s !== 'colorHistory');
        return ['visitType', 'name', 'interimChange', 'menu', 'hairLength', ...colorBlockExisting, ...waveBlock, 'styleImage', 'review', 'complete'];
      }
      // 新規 ＋ 未選択時のデフォルト
      return ['visitType', 'name', 'birth', 'contact', 'source', 'allergy', 'history', 'scalp', 'hairConcern', 'menu', 'hairLength', ...colorBlock, ...waveBlock, 'styleImage', 'review', 'complete'];
    }

    const pad = (n) => String(n).padStart(2, '0');
    const isColorMenu = (menu) => (menu || []).some((m) => COLOR_MENUS.includes(m));
    const expandOther = (arr, otherText) =>
      (arr || []).map((v) => (v === 'その他' && otherText ? 'その他（' + otherText + '）' : v)).join('、');

    // ====== UI部品：選択カードボタン（タップしやすい大きさ） ======
    function OptionCard({ selected, label, onClick }) {
      return h('button', {
        type: 'button',
        onClick,
        className: 'w-full text-left rounded-xl px-5 py-4 mb-3 flex items-center justify-between transition-all duration-150 active:scale-[0.98]',
        style: {
          backgroundColor: selected ? C.goldSoft : C.card,
          border: '1.5px solid ' + (selected ? C.gold : C.border),
          color: C.text,
          fontSize: '1rem',
          lineHeight: '1.5',
        },
      },
        h('span', { className: 'pr-3' }, label),
        selected
          ? h('span', { style: { flex: '0 0 auto' } }, h(Icon, { name: 'check', size: 20, color: C.gold }))
          : h('span', {
              style: {
                flex: '0 0 auto', width: 20, height: 20, borderRadius: 999,
                border: '1.5px solid ' + C.border,
              },
            })
      );
    }

    // ====== UI部品：大きめ二択カード（来店種別） ======
    function BigCard({ title, sub, icon, onClick }) {
      return h('button', {
        type: 'button',
        onClick,
        className: 'w-full rounded-2xl px-6 py-7 mb-4 flex items-center gap-4 transition-all duration-150 active:scale-[0.98]',
        style: { backgroundColor: C.card, border: '1.5px solid ' + C.border, color: C.text },
      },
        h('span', {
          style: {
            flex: '0 0 auto', width: 48, height: 48, borderRadius: 14,
            backgroundColor: C.goldSoft, display: 'flex', alignItems: 'center', justifyContent: 'center',
          },
        }, h(Icon, { name: icon, size: 24, color: C.gold })),
        h('span', { className: 'text-left' },
          h('span', { className: 'block', style: { fontSize: '1.0625rem', fontWeight: 500 } }, title),
          h('span', { className: 'block mt-1', style: { fontSize: '0.8125rem', color: C.muted } }, sub)
        )
      );
    }

    // ====== UI部品：入力ラベル ======
    function Field({ label, children, optional }) {
      return h('div', { className: 'mb-5' },
        h('label', { className: 'block mb-2', style: { fontSize: '0.875rem', color: C.muted } },
          label,
          optional ? h('span', { style: { color: C.muted, marginLeft: 6, fontSize: '0.8125rem' } }, '（任意）') : null
        ),
        children
      );
    }

    const inputStyle = {
      width: '100%',
      backgroundColor: C.base,
      border: '1.5px solid ' + C.border,
      color: C.text,
      borderRadius: 12,
      padding: '14px 14px',
      outline: 'none',
    };

    // ============================================================
    //  メインアプリ
    // ============================================================
    function App() {
      const [form, setForm] = useState({
        visitType: '',            // 'new' | 'existing'
        lastName: '', firstName: '',
        birthYear: '', birthMonth: '', birthDay: '',
        phone: '', email: '',
        source: '', sourceOther: '',
        allergy: [], allergyOther: '',
        history: [],
        scalp: [],
        hairConcern: [],
        interimChange: [],
        menu: [], menuOther: '',
        hairLength: '',
        colorTone: '', colorBright: '', colorGray: '', colorRange: '',
        colorHistory: [], colorSafety: '',
        permFinish: '', straightRange: '', qualityFocus: '',
        styleImage: '', styleOmakase: false,
      });
      const [stepIndex, setStepIndex] = useState(0);
      const [saved, setSaved] = useState(false);
      const [copied, setCopied] = useState(false);
      const [lineStatus, setLineStatus] = useState(null); // 'prefill'（本文自動入力）| 'paste'（貼り付け案内）
      const [karteStatus, _setKarteStatus] = useState(null); // null | 'saving' | 'saved' | 'failed'
      const karteStatusRef = useRef(null); // 非同期処理から最新値を読むためのミラー
      const setKarteStatus = (v) => { karteStatusRef.current = v; _setKarteStatus(v); };
      const [editingFromReview, setEditingFromReview] = useState(false);
      const [photos, setPhotos] = useState([]);
      const [fontSize, setFontSize] = useState(() => {
        try { return localStorage.getItem(FONT_SIZE_KEY) || 'normal'; } catch (e) { return 'normal'; }
      });
      const topRef = useRef(null);
      const photoInputRef = useRef(null);

      const steps = getSteps(form.visitType, form.menu, form.colorRange);
      const step = steps[stepIndex];
      const totalQuestions = steps.length - 1;     // 完了画面を除く
      const isComplete = step === 'complete';
      const questionNo = Math.min(stepIndex + 1, totalQuestions);

      // ステップが変わるたび先頭へスクロール
      useEffect(() => {
        if (topRef.current) topRef.current.scrollIntoView({ behavior: 'instant', block: 'start' });
        window.scrollTo(0, 0);
      }, [stepIndex, form.visitType]);

      // メニュー変更でステップ数が減った時のはみ出し防止
      useEffect(() => {
        if (stepIndex > steps.length - 1) setStepIndex(steps.length - 1);
      }, [steps.length]);

      // 文字サイズを<html>の基準フォントサイズへ反映＋保存（シャンプー診断と同方式）
      useEffect(() => {
        document.documentElement.dataset.fontSize = fontSize;
        try { localStorage.setItem(FONT_SIZE_KEY, fontSize); } catch (e) {}
      }, [fontSize]);

      const set = (k, v) => setForm((p) => ({ ...p, [k]: v }));

      // 複数選択トグル（「とくになし」系は排他）
      const toggleMulti = (key, value) => {
        const none = NONE[key];
        setForm((prev) => {
          const cur = prev[key] || [];
          let next;
          if (none && value === none) {
            next = cur.includes(value) ? [] : [value];
          } else {
            const without = none ? cur.filter((v) => v !== none) : cur.slice();
            next = without.includes(value) ? without.filter((v) => v !== value) : [...without, value];
          }
          return { ...prev, [key]: next };
        });
      };

      // 年齢の自動計算（本日基準）
      const computeAge = () => {
        if (!form.birthYear || !form.birthMonth || !form.birthDay) return '';
        const b = new Date(Number(form.birthYear), Number(form.birthMonth) - 1, Number(form.birthDay));
        const t = new Date();
        let age = t.getFullYear() - b.getFullYear();
        const m = t.getMonth() - b.getMonth();
        if (m < 0 || (m === 0 && t.getDate() < b.getDate())) age--;
        return age;
      };

      // 仕上がりイメージ（おまかせ／テキスト・URL／写真枚数）を1つの文字列に
      const getStyleStr = () => {
        const parts = [];
        if (form.styleOmakase) parts.push('おまかせ');
        if (form.styleImage) parts.push(form.styleImage);
        if (photos.length) parts.push('参考写真' + photos.length + '枚' + (karteStatusRef.current === 'saved' ? '（カルテ保存済み）' : '（別途お送りします）'));
        return parts.join(' / ');
      };
      // 記入内容の送付チャネル（メインはLINE直接送信。ここは予備手段の案内文）
      const sendChannel = () => form.visitType === 'new'
        ? 'LINEのトーク（またはご予約時のメッセージ・InstagramのDM）'
        : 'LINEのトーク画面';
      const onPhotoChange = (e) => {
        const files = Array.from(e.target.files || []);
        const added = files.map((f) => ({ name: f.name, url: URL.createObjectURL(f), file: f }));
        setPhotos((prev) => [...prev, ...added]);
        e.target.value = '';
      };
      const removePhoto = (idx) => setPhotos((prev) => prev.filter((_, i) => i !== idx));

      // バリデーション
      const isValid = (s) => {
        switch (s) {
          case 'visitType': return !!form.visitType;
          case 'name':
            return form.lastName.trim().length > 0 && form.firstName.trim().length > 0;
          case 'birth': return form.birthYear && form.birthMonth && form.birthDay;
          case 'contact': return true; // 連絡先は任意（ご予約時に取得済みのため）
          case 'source':
            return !!form.source && (form.source !== 'その他' || form.sourceOther.trim().length > 0);
          case 'allergy':
            return form.allergy.length > 0 && (!form.allergy.includes('その他') || form.allergyOther.trim().length > 0);
          case 'history': return form.history.length > 0;
          case 'scalp': return form.scalp.length > 0;
          case 'hairConcern': return form.hairConcern.length > 0;
          case 'interimChange': return form.interimChange.length > 0;
          case 'menu':
            return form.menu.length > 0 && (!form.menu.includes('その他') || form.menuOther.trim().length > 0);
          case 'hairLength': return !!form.hairLength;
          case 'colorTone': return !!form.colorTone;
          case 'colorBright': return !!form.colorBright;
          case 'colorGray': return !!form.colorGray;
          case 'colorRange': return !!form.colorRange;
          case 'colorHistory': return form.colorHistory.length > 0;
          case 'colorSafety': return !!form.colorSafety;
          case 'permFinish': return !!form.permFinish;
          case 'straightRange': return !!form.straightRange;
          case 'qualityFocus': return !!form.qualityFocus;
          case 'styleImage': return true; // 任意
          case 'review': return true;
          default: return true;
        }
      };

      // 確認画面から特定の質問へジャンプ（編集後は確認画面へ戻す）
      const goToStep = (key) => { const i = steps.indexOf(key); if (i >= 0) { setEditingFromReview(true); setStepIndex(i); } };
      const next = () => {
        if (!isValid(step)) return;
        if (editingFromReview && step !== 'review') {
          setEditingFromReview(false);
          const i = steps.indexOf('review');
          if (i >= 0) { setStepIndex(i); return; }
        }
        setStepIndex((i) => Math.min(i + 1, steps.length - 1));
      };
      const back = () => { setEditingFromReview(false); setStepIndex((i) => Math.max(i - 1, 0)); };

      // 来店種別の選択 → 自動で次へ
      const chooseVisit = (type) => {
        setForm((p) => ({ ...p, visitType: type }));

      };

      // ====== カルテ用データ（CSVダウンロードとカルテ自動保存で共用） ======
      const buildKarteData = () => {
        const isNew = form.visitType === 'new';
        const now = new Date();
        const dateTime =
          now.getFullYear() + '-' + pad(now.getMonth() + 1) + '-' + pad(now.getDate()) +
          ' ' + pad(now.getHours()) + ':' + pad(now.getMinutes());
        const fileDate = '' + now.getFullYear() + pad(now.getMonth() + 1) + pad(now.getDate());

        const visitLabel = isNew ? '新規' : '既存';
        const birthStr = isNew && form.birthYear
          ? form.birthYear + '/' + pad(form.birthMonth) + '/' + pad(form.birthDay) : '';
        const ageStr = isNew ? String(computeAge()) : '';

        // expandOther / isColorMenu はモジュール先頭で定義済み
        const color = isColorMenu(form.menu);
        const perm = form.menu.includes('パーマ');
        const straight = form.menu.includes('縮毛矯正');
        const quality = form.menu.includes('髪質改善トリートメント');
        const sourceStr = isNew
          ? (form.source === 'その他' && form.sourceOther ? 'その他（' + form.sourceOther + '）' : form.source)
          : '';
        const allergyStr = isNew ? expandOther(form.allergy, form.allergyOther) : '';
        const historyStr = isNew ? form.history.join('、') : '';
        const scalpStr = form.scalp.join('、');
        const hairStr = form.hairConcern.join('、');
        const menuStr = expandOther(form.menu, form.menuOther);

        const headers = [
          '記入日時', '来店種別', '姓', '名', '生年月日', '年齢',
          '電話番号', 'メールアドレス', 'アレルギー・敏感肌', '施術履歴（直近1年）', '前回からの変化',
          '頭皮の状態', '髪の悩み', '希望メニュー', '髪の長さ',
          'カラー：なりたい色', 'カラー：明るさ', 'カラー：白髪', 'カラー：染める範囲',
          'カラー：今の髪の状態', 'カラー：かぶれ経験',
          'パーマ：仕上がり', '縮毛矯正：範囲', '髪質改善：希望',
          '希望スタイルイメージ', '流入経路',
        ];
        const row = [
          dateTime, visitLabel, form.lastName, form.firstName,
          birthStr, ageStr,
          isNew ? form.phone : '', isNew ? form.email : '',
          allergyStr, historyStr, isNew ? '' : form.interimChange.join('、'), scalpStr, hairStr, menuStr, form.hairLength,
          color ? form.colorTone : '', color ? form.colorBright : '',
          color ? form.colorGray : '', color ? form.colorRange : '',
          color ? form.colorHistory.join('、') : '', color ? form.colorSafety : '',
          perm ? form.permFinish : '', straight ? form.straightRange : '', quality ? form.qualityFocus : '',
          // カルテ側では写真の送付案内（お客様向け文言）は不要なので枚数表記だけにする
          getStyleStr().replace('（別途お送りします）', '').replace('（カルテ保存済み）', ''), sourceStr,

        const nameForFile = (form.lastName + form.firstName) || 'お客様';
        const dateLabel = now.getFullYear() + '-' + pad(now.getMonth() + 1) + '-' + pad(now.getDate());
        return { headers, row, dateTime, fileDate, dateLabel, nameForFile };
      };

      // ====== CSV生成・ダウンロード ======
      const buildAndDownloadCSV = () => {
        const { headers, row, fileDate, nameForFile } = buildKarteData();
        const esc = (v) => '"' + String(v == null ? '' : v).replace(/"/g, '""') + '"';
        const csv = '﻿' + [headers, row].map((r) => r.map(esc).join(',')).join('\r\n');

        const filename = 'counseling_' + fileDate + '_' + nameForFile + '.csv';

        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 1500);
        setSaved(true);

        /* =========================================================
         *  将来の拡張（今回は実装しない・雛形のみ）
         * ---------------------------------------------------------
         *  // 1) Googleスプレッドシートへ自動送信（GAS連携）
         *  //   const GAS_ENDPOINT = 'https://script.google.com/macros/s/XXXX/exec';
         *  //   fetch(GAS_ENDPOINT, { method:'POST', mode:'no-cors',
         *  //     headers:{'Content-Type':'application/json'},
         *  //     body: JSON.stringify(form) });
         *
         *  // 2) Hair Identity シャンプー診断との統合
         *  //   診断結果（9タイプ）を頭皮・髪の悩みと突合し、来店前に提案を準備
         *
         *  // 3) QRコード生成（LINEで送りやすくする）
         *  //   このページURLをQR化してサロン掲示／LINE配布
         * ========================================================= */
      };

      // ====== 受け取り導線：内容を整形して共有/コピー（お客様のスマホ→LINE） ======
      const buildSummaryText = () => {
        const isNew = form.visitType === 'new';
        const color = isColorMenu(form.menu);
        const now = new Date();
        const nowStr = now.getFullYear() + '/' + pad(now.getMonth() + 1) + '/' + pad(now.getDate()) +
          ' ' + pad(now.getHours()) + ':' + pad(now.getMinutes());
        const L = [];
        L.push('【ご来店前カウンセリング】');
        L.push('お名前：' + form.lastName + (form.firstName ? ' ' + form.firstName : '') + ' 様');
        L.push('来店種別：' + (isNew ? '新規' : '以前にも来店'));
        if (isNew) {
          const age = computeAge();
          if (form.birthYear) L.push('生年月日：' + form.birthYear + '/' + pad(form.birthMonth) + '/' + pad(form.birthDay) + (age !== '' ? '（' + age + '歳）' : ''));
          if (form.phone) L.push('電話：' + form.phone);
          if (form.email) L.push('メール：' + form.email);
          if (form.source) L.push('知ったきっかけ：' + (form.source === 'その他' && form.sourceOther ? 'その他（' + form.sourceOther + '）' : form.source));
          if (form.allergy.length) L.push('アレルギー・敏感肌：' + expandOther(form.allergy, form.allergyOther));
          if (form.history.length) L.push('施術履歴（直近1年）：' + form.history.join('、'));
        }
        if (form.visitType === 'existing') {
          if (form.interimChange.length) L.push('前回からの変化：' + form.interimChange.join('、'));
        }
        if (form.scalp.length) L.push('頭皮の状態：' + form.scalp.join('、'));
        if (form.hairConcern.length) L.push('髪の悩み：' + form.hairConcern.join('、'));
        L.push('ご希望メニュー：' + expandOther(form.menu, form.menuOther));
        if (form.hairLength) L.push('髪の長さ：' + form.hairLength);
        if (color) {
          L.push('― カラーのご希望 ―');
          if (form.colorRange) L.push('・範囲：' + form.colorRange);
          if (form.colorTone) L.push('・なりたい色：' + form.colorTone);
          if (form.colorBright) L.push('・明るさ：' + form.colorBright);
          if (form.colorGray) L.push('・白髪：' + form.colorGray);
          if (form.colorHistory.length) L.push('・今の髪の状態：' + form.colorHistory.join('、'));
          if (form.colorSafety) L.push('・カラーかぶれ経験：' + form.colorSafety);
        }
        if (form.permFinish) L.push('パーマの仕上がり：' + form.permFinish);
        if (form.straightRange) L.push('縮毛矯正の範囲：' + form.straightRange);
        if (form.qualityFocus) L.push('髪質改善で改善したい：' + form.qualityFocus);
        const styleStr = getStyleStr();
        if (styleStr) L.push('仕上がりイメージ：' + styleStr);
        L.push('記入日時：' + nowStr);
        return L.join('\n');
      };

      const sendSummary = async () => {
        const text = buildSummaryText();
        let shared = false;
        try {
          if (navigator.share) { await navigator.share({ text: text }); shared = true; }
        } catch (e) { /* 共有キャンセル時はコピーにフォールバック */ }
        if (!shared) {
          try {
            await navigator.clipboard.writeText(text);
          } catch (e) {
            const ta = document.createElement('textarea');
            ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
            document.body.appendChild(ta); ta.focus(); ta.select();
            try { document.execCommand('copy'); } catch (_) {}
            document.body.removeChild(ta);
          }
          setCopied(true);
        }
      };

      // LINE公式アカウント（@130awepd）のトークを直接開いて本文を自動入力する
      // 参考: https://line.me/R/oaMessage/{LINE ID}/?{メッセージ} （LINE公式のURLスキーム）
      const LINE_OA_ID = '%40130awepd';
      const copyText = async (text) => {
        try {
          await navigator.clipboard.writeText(text);
        } catch (e) {
          const ta = document.createElement('textarea');
          ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
          document.body.appendChild(ta); ta.focus(); ta.select();
          try { document.execCommand('copy'); } catch (_) {}
          document.body.removeChild(ta);
        }
      };
      const sendViaLine = async () => {
        // カルテ保存が進行中なら最大8秒だけ待つ（本文の写真表記を正しくするため）
        for (let i = 0; i < 40 && karteStatusRef.current === 'saving'; i++) {
          await new Promise((r) => setTimeout(r, 200));
        }
        const text = buildSummaryText();
        // 保険として必ず先にコピーしておく（自動入力が効かない環境でも貼るだけで済む）
        await copyText(text);
        const encoded = encodeURIComponent(text);
        if (encoded.length <= 4000) {
          // トークを開いて本文を自動入力（お客様は送信を押すだけ）
          setLineStatus('prefill');
          window.location.href = 'https://line.me/R/oaMessage/' + LINE_OA_ID + '/?' + encoded;
        } else {
          // 本文が長い場合はURLが切れる恐れがあるため、トークだけ開いて貼り付けてもらう
          setLineStatus('paste');
          window.location.href = 'https://line.me/R/ti/p/' + LINE_OA_ID;
        }
      };

      // ====== カルテ自動保存（Google Apps Script経由でスプレッドシート＋ドライブへ） ======
      const KARTE_ENDPOINT = 'https://script.google.com/macros/s/AKfycbxLyebHUGKmbw8dSRfRpQi_BeNGVZHI02a1MLhRtOWojlMsD0ZJvJ5WzIa_bNsqhtgxZw/exec'; // GASのウェブアプリURL
      const KARTE_SECRET = 'hashimoto-karte-2026';

      // 写真を縮小してdataURL化（長辺1600px・JPEG）：通信量と保存容量の節約
      const photoToDataUrl = (file) => new Promise((resolve) => {
        const img = new Image();
        const objUrl = URL.createObjectURL(file);
        img.onload = () => {
          const MAX = 1600;
          const scale = Math.min(1, MAX / Math.max(img.width, img.height));
          const w = Math.round(img.width * scale);
          const ht = Math.round(img.height * scale);
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = ht;
          canvas.getContext('2d').drawImage(img, 0, 0, w, ht);
          URL.revokeObjectURL(objUrl);
          resolve(canvas.toDataURL('image/jpeg', 0.85));
        };
        img.onerror = () => { URL.revokeObjectURL(objUrl); resolve(null); };
        img.src = objUrl;
      });

      const saveKarte = async () => {
        if (!KARTE_ENDPOINT) return;
        setKarteStatus('saving');
        try {
          const { headers, row, dateLabel, nameForFile } = buildKarteData();
          const dataUrls = [];
          for (const p of photos) {
            if (!p.file) continue;
            const d = await photoToDataUrl(p.file);
            if (d) dataUrls.push({ name: p.name, dataUrl: d });
          }
          const res = await fetch(KARTE_ENDPOINT, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({
              secret: KARTE_SECRET,
              headers, row, dateLabel,
              customerName: nameForFile,
              photos: dataUrls,
            }),
          });
          const out = await res.json();
          setKarteStatus(out && out.ok ? 'saved' : 'failed');
        } catch (e) {
          setKarteStatus('failed');
        }
      };

      // 完了画面に到達したら一度だけ自動保存
      useEffect(() => {
        if (step === 'complete' && karteStatusRef.current === null) saveKarte();
      }, [step]);

      // ====== 各ステップの本文 ======

                    style: { fontSize: '0.8125rem', color: C.muted, lineHeight: 1.9 },
                  },
                    '※髪が長い方は、使う薬剤の量や施術のお時間が増えるため、仕上がりを美しく保つための「ロング料金」を頂戴する場合があります（目安：長さに応じて +¥1,650〜3,300／税込）。正確な料金は当日、髪を拝見してからご案内しますので、どうぞご安心ください。')
                : null
            )
          );
        }

        // ===== カラー深掘り（カラー系メニュー選択時のみ表示） =====
        if (step === 'colorTone') {
          return Q('なりたい髪色の方向は？',
            'わからなければ「おまかせ」で大丈夫です。',
            h('div', {}, COLOR_TONE.map((o) => h(OptionCard, {
              key: o, label: o, selected: form.colorTone === o, onClick: () => set('colorTone', o),
            }))));
        }
        if (step === 'colorBright') {
          return Q('今の髪色と比べて、明るさは？', null,
            h('div', {}, COLOR_BRIGHT.map((o) => h(OptionCard, {
              key: o, label: o, selected: form.colorBright === o, onClick: () => set('colorBright', o),
            }))));
        }
        if (step === 'colorGray') {
          return Q('白髪は気になりますか？', null,
            h('div', {}, COLOR_GRAY.map((o) => h(OptionCard, {
              key: o, label: o, selected: form.colorGray === o, onClick: () => set('colorGray', o),
            }))));
        }
        if (step === 'colorRange') {
          return Q('染めたい範囲は？',
            'カラーをご希望なので、当日までに薬剤をご用意するために少しだけ伺います。',
            h('div', {}, COLOR_RANGE.map((o) => h(OptionCard, {
              key: o, label: o, selected: form.colorRange === o,
              // リタッチは色・明るさを聞かないため、過去に選んだ回答が残らないようクリアする
              onClick: () => setForm((p) => (o === RETOUCH ? { ...p, colorRange: o, colorTone: '', colorBright: '' } : { ...p, colorRange: o })),
            }))));
        }
        if (step === 'colorHistory') {
          return Q('今の髪の状態を教えてください', '当てはまるものをすべてお選びください。薬剤を選ぶ大切な情報です。',
            h('div', {}, COLOR_HISTORY.map((o) => h(OptionCard, {
              key: o, label: o, selected: form.colorHistory.includes(o), onClick: () => toggleMulti('colorHistory', o),
            }))));
        }
        if (step === 'colorSafety') {
          return Q('これまでカラーで頭皮トラブルは？',
            '頭皮に合った薬剤を選ぶために伺います。安心して施術を受けていただくための質問です。',
            h('div', {}, COLOR_SAFETY.map((o) => h(OptionCard, {
              key: o, label: o, selected: form.colorSafety === o, onClick: () => set('colorSafety', o),
            }))));
        }

        // ===== パーマ／縮毛矯正の深掘り（該当メニュー選択時のみ） =====
        if (step === 'permFinish') {
          return Q('パーマの仕上がりイメージは？',
            'パーマ液を準備するために伺います。わからなければ「おまかせ」で大丈夫です。',
            h('div', {}, PERM_FINISH.map((o) => h(OptionCard, {
              key: o, label: o, selected: form.permFinish === o, onClick: () => set('permFinish', o),
            }))));
        }
        if (step === 'straightRange') {
          return Q('縮毛矯正をかける範囲は？',
            '薬剤を準備するために伺います。わからなければ「おまかせ」で大丈夫です。',
            h('div', {}, STRAIGHT_RANGE.map((o) => h(OptionCard, {
              key: o, label: o, selected: form.straightRange === o, onClick: () => set('straightRange', o),
            }))));
        }
        if (step === 'qualityFocus') {
          return Q('髪質改善で、一番よくしたいところは？',
            '薬剤を準備するために伺います。わからなければ「おまかせ」で大丈夫です。',
            h('div', {}, QUALITY_FOCUS.map((o) => h(OptionCard, {
              key: o, label: o, selected: form.qualityFocus === o, onClick: () => set('qualityFocus', o),
            }))));
        }

        if (step === 'styleImage') {
          return Q('仕上がりのイメージを教えてください', '言葉でも、SNSのリンクでも、お写真でも、おまかせでも大丈夫です。（任意）',
            h('div', {},
              // ① おまかせ
              h('button', {
                type: 'button', onClick: () => set('styleOmakase', !form.styleOmakase),
                className: 'w-full text-left rounded-xl px-5 py-4 mb-4 flex items-center justify-between transition-all duration-150 active:scale-[0.98]',
                style: {
                  backgroundColor: form.styleOmakase ? C.goldSoft : C.card,
                  border: '1.5px solid ' + (form.styleOmakase ? C.gold : C.border),
                  color: C.text, fontSize: '1rem',
                },
              },
                h('span', {}, 'おまかせ（プロにお任せ）'),
                form.styleOmakase ? h(Icon, { name: 'check', size: 20, color: C.gold }) : null
              ),
              // ② 言葉・URL
              h('textarea', {
                value: form.styleImage, rows: 4,
                placeholder: 'なりたい雰囲気、芸能人の名前、InstagramやPinterestのリンクなど',
                onChange: (e) => set('styleImage', e.target.value),
                style: { ...inputStyle, resize: 'none', lineHeight: 1.6 },
              }),
              // ③ 写真を選ぶ
              h('input', {
                ref: photoInputRef, type: 'file', accept: 'image/*', multiple: true,
                onChange: onPhotoChange, style: { display: 'none' },
              }),
              h('button', {
                type: 'button', onClick: () => photoInputRef.current && photoInputRef.current.click(),
                className: 'w-full rounded-xl mt-3 flex items-center justify-center gap-2 active:scale-[0.98] transition-all',
                style: { backgroundColor: 'transparent', color: C.text, border: '1.5px dashed ' + C.border, padding: '14px', fontSize: '0.9375rem' },
              },
                h(Icon, { name: 'image', size: 18, color: C.gold }),
                '写真を選ぶ'
              ),
              photos.length
                ? h('div', { className: 'flex flex-wrap gap-2 mt-3' },
                    photos.map((p, i) => h('div', { key: i, style: { position: 'relative' } },
                      h('img', { src: p.url, style: { width: 72, height: 72, objectFit: 'cover', borderRadius: 8, border: '1px solid ' + C.border, display: 'block' } }),
                      h('button', {
                        type: 'button', onClick: () => removePhoto(i),
                        style: { position: 'absolute', top: -8, right: -8, width: '1.375rem', height: '1.375rem', borderRadius: 999, background: C.base, color: C.text, border: '1px solid ' + C.border, fontSize: '0.8125rem', lineHeight: '1.25rem', cursor: 'pointer' },
                      }, '×')
                    ))
                  )
                : null,
              photos.length
                ? h('p', { className: 'mt-3', style: { fontSize: '0.75rem', color: C.muted, lineHeight: 1.7 } },
                    KARTE_ENDPOINT
                      ? '※お写真は、最後の送信時に自動で橋元へ届きます。'
                      : '※お写真は、送信後に' + sendChannel() + 'にも貼り付けてお送りください。')
                : null
            )
          );
        }

        if (step === 'review') {
          const isNew = form.visitType === 'new';
          const color = isColorMenu(form.menu);
          const rows = [];
          // editable=false の行は「修正」ボタンを出さない（来店種別は変えると流れが変わるため）
          const add = (label, value, key, editable) => {
            if (value !== '' && value != null) rows.push({ label, value, step: key, editable: editable !== false });
          };
          add('来店種別', isNew ? '新規' : '以前にも来店', 'visitType', false);
          add('お名前', form.lastName + (form.firstName ? ' ' + form.firstName : '') + ' 様', 'name');
          if (isNew) {
            const age = computeAge();
            if (form.birthYear) add('生年月日', form.birthYear + '/' + pad(form.birthMonth) + '/' + pad(form.birthDay) + (age !== '' ? '（' + age + '歳）' : ''), 'birth');
            add('電話番号', form.phone, 'contact');
            add('メール', form.email, 'contact');
            add('知ったきっかけ', form.source === 'その他' && form.sourceOther ? 'その他（' + form.sourceOther + '）' : form.source, 'source');
            add('アレルギー・敏感肌', expandOther(form.allergy, form.allergyOther), 'allergy');
            add('施術履歴（直近1年）', form.history.join('、'), 'history');
          }
          if (!isNew) add('前回からの変化', form.interimChange.join('、'), 'interimChange');
          add('頭皮の状態', form.scalp.join('、'), 'scalp');
          add('髪の悩み', form.hairConcern.join('、'), 'hairConcern');
          add('ご希望メニュー', expandOther(form.menu, form.menuOther), 'menu');
          add('髪の長さ', form.hairLength, 'hairLength');
          if (color) {
            add('染める範囲', form.colorRange, 'colorRange');
            add('なりたい色', form.colorTone, 'colorTone');
            add('明るさ', form.colorBright, 'colorBright');
            add('白髪', form.colorGray, 'colorGray');
            add('今の髪の状態', form.colorHistory.join('、'), 'colorHistory');
            add('カラーかぶれ経験', form.colorSafety, 'colorSafety');
          }
          add('パーマの仕上がり', form.permFinish, 'permFinish');
          add('縮毛矯正の範囲', form.straightRange, 'straightRange');
          add('髪質改善で改善したい', form.qualityFocus, 'qualityFocus');
          add('仕上がりイメージ', getStyleStr(), 'styleImage');

          return Q('ご入力内容の確認', '間違いがなければ「この内容で進む」を押してください。',
            h('div', { style: { borderTop: '1px solid ' + C.border } },
              rows.map((r, idx) => h('div', {
                key: idx,
                className: 'flex items-start justify-between gap-3 py-3',
                style: { borderBottom: '1px solid ' + C.border },
              },
                h('div', { className: 'flex-1' },
                  h('div', { style: { fontSize: '0.8125rem', color: C.muted, marginBottom: 2 } }, r.label),
                  h('div', { style: { fontSize: '0.9375rem', color: C.text, lineHeight: 1.5, whiteSpace: 'pre-wrap' } }, r.value)
                ),
                r.editable
                  ? h('button', {
                      type: 'button', onClick: () => goToStep(r.step),
                      className: 'active:scale-[0.95] transition-all',
                      style: { flex: '0 0 auto', fontSize: '0.8125rem', color: C.gold, padding: '4px 8px', background: 'transparent', border: 'none', cursor: 'pointer' },
                    }, '修正')
                  : null
              ))
            )
          );
        }

        if (step === 'complete') {
          const needsChemical = isColorMenu(form.menu) || form.menu.includes('パーマ') || form.menu.includes('縮毛矯正') || form.menu.includes('髪質改善トリートメント');
          return h('div', { className: 'fade-step text-center', style: { paddingTop: 20 } },
            h('div', {
              style: {
                width: 72, height: 72, borderRadius: 999, margin: '0 auto 18px',
                backgroundColor: C.goldSoft, display: 'flex', alignItems: 'center', justifyContent: 'center',
              },
            }, h(Icon, { name: 'check', size: 36, color: C.gold })),
            h('h2', { style: { fontSize: '1.25rem', fontWeight: 700 } }, 'ありがとうございました'),
            h('p', { className: 'mt-3', style: { fontSize: '0.875rem', color: C.muted, lineHeight: 1.9 } },
              'いただいた内容をもとに、担当の橋元が', h('br'),
              (needsChemical ? '当日まで薬剤や仕上がりの準備を進めます。' : '当日までに仕上がりのご準備を進めます。'), h('br'),
              '安心してご来店ください。'),

            // お客様のスマホ → LINEのトークを直接開いて橋元へ送る（メイン導線）
            h('button', {
              type: 'button', onClick: sendViaLine,
              className: 'w-full rounded-xl mt-8 flex items-center justify-center gap-2 active:scale-[0.98] transition-all',
              style: { backgroundColor: '#06C755', color: '#ffffff', fontWeight: 700, padding: '16px', fontSize: '1rem' },
            },
              h(Icon, { name: 'message-circle', size: 20, color: '#ffffff' }),
              'LINEで橋元に送る'
            ),
            form.visitType === 'new' && !lineStatus
              ? h('p', { className: 'mt-3', style: { fontSize: '0.8125rem', color: C.muted, lineHeight: 1.7 } },
                  'はじめての方は、友だち追加のあとにトークが開きます。')
              : null,
            lineStatus
              ? h('p', { className: 'mt-3', style: { fontSize: '0.8125rem', color: C.gold, lineHeight: 1.7 } },
                  lineStatus === 'prefill'
                    ? '✓ LINEが開いたら、入力欄の内容をそのまま送信してください。（本文はコピー済みです。もし空欄のときは長押しで貼り付けてください）'
                    : '✓ 本文をコピーしました。開いたLINEのトークに貼り付けて送信してください。')
              : null,
            photos.length
              ? h('p', { className: 'mt-3', style: { fontSize: '0.8125rem', color: C.gold, lineHeight: 1.7 } },
                  karteStatus === 'saved'
                    ? '📷 参考写真（' + photos.length + '枚）は自動で保存されました。LINEへの貼り付けは不要です。'
                    : karteStatus === 'saving'
                      ? '📷 参考写真（' + photos.length + '枚）を保存しています…そのままお待ちください。'
                      : '📷 選んでいただいた参考写真（' + photos.length + '枚）も、同じLINEのトークにそのまま貼り付けてお送りください。')
              : null,

            // 予備：共有シート／コピー（LINE以外で送りたい方向け）
            h('button', {
              type: 'button', onClick: sendSummary,
              className: 'w-full rounded-xl mt-4 flex items-center justify-center gap-2 active:scale-[0.98] transition-all',
              style: { backgroundColor: 'transparent', color: C.text, fontWeight: 600, padding: '15px', fontSize: '0.9375rem', border: '1.5px solid ' + C.border },
            },
              h(Icon, { name: 'send', size: 18, color: C.text }),
              'その他の方法で送る／コピー'
            ),
            copied
              ? h('p', { className: 'mt-3', style: { fontSize: '0.8125rem', color: C.gold, lineHeight: 1.7 } },
                  '✓ 送信用の内容をコピーしました。' + sendChannel() + 'に貼り付けて橋元へお送りください。')
              : null,

            // サロン／橋元さんの端末で記入した場合の保存
            h('button', {
              type: 'button', onClick: buildAndDownloadCSV,
              className: 'w-full rounded-xl mt-4 flex items-center justify-center gap-2 active:scale-[0.98] transition-all',
              style: { backgroundColor: 'transparent', color: C.text, fontWeight: 600, padding: '15px', fontSize: '0.9375rem', border: '1.5px solid ' + C.border },
            },
              h(Icon, { name: 'download', size: 18, color: C.text }),
              'CSVで保存（控え用）'
            ),
            saved
              ? h('p', { className: 'mt-3', style: { fontSize: '0.8125rem', color: C.muted } }, '✓ CSVを保存しました。')
              : null,

            h('p', { className: 'mt-6', style: { fontSize: '0.75rem', color: C.muted, lineHeight: 1.7 } },
              '※いただいた情報は、施術のご準備とご連絡のみに使用します。')
          );
        }

        return null;
      }

      // ====== 進捗バー ======
      const progressPct = isComplete ? 100 : Math.round((questionNo / totalQuestions) * 100);

      return h('div', { style: { minHeight: '100vh', backgroundColor: C.base } },
        h('div', {
          ref: topRef,
          style: { maxWidth: 480, margin: '0 auto', minHeight: '100vh', display: 'flex', flexDirection: 'column' },
        },
          // ヘッダー
          h('header', { className: 'px-5 pt-6 pb-3' },
            h('div', { className: 'flex items-center gap-2' },
              h(Icon, { name: 'scissors', size: 18, color: C.gold }),
              h('span', { style: { fontSize: '0.8125rem', letterSpacing: '0.2em', color: C.gold, fontWeight: 500 } }, 'RYOICHI HASHIMOTO'),
            ),
            h('p', { className: 'mt-2', style: { fontSize: '0.9375rem', color: C.text, fontWeight: 500 } }, 'ご来店前カウンセリングシート'),
            h('p', { className: 'mt-1', style: { fontSize: '0.8125rem', color: C.muted, lineHeight: 1.6 } }, 'あなたに似合うスタイルを、一緒に見つけるために。'),
            h('div', { className: 'fs-selector', role: 'group', 'aria-label': '文字サイズの選択' },
              h('span', { className: 'fs-selector-lbl' }, '文字サイズ'),
              FONT_SIZE_OPTIONS.map((opt) => h('button', {
                key: opt.key,
                type: 'button',
                className: 'fs-btn ' + opt.btnClass + (fontSize === opt.key ? ' active' : ''),
                'aria-pressed': fontSize === opt.key,
                onClick: (e) => { e.currentTarget.blur(); setFontSize(opt.key); },
              }, opt.label))
            )
          ),

          // 進捗バー
          !isComplete
            ? h('div', { className: 'px-5 pb-4' },
                h('div', { className: 'flex items-center justify-between mb-2' },
                  h('span', { style: { fontSize: '0.8125rem', color: C.muted } }, step === 'review' ? '最終確認' : '質問'),
                  h('span', { style: { fontSize: '0.8125rem', color: C.gold, fontWeight: 500 } }, step === 'review' ? '' : questionNo + ' / ' + totalQuestions)
                ),
                h('div', { style: { height: 4, borderRadius: 999, backgroundColor: C.border, overflow: 'hidden' } },
                  h('div', {
                    style: {
                      height: '100%', width: progressPct + '%', backgroundColor: C.gold,
                      borderRadius: 999, transition: 'width .3s ease',
                    },
                  })
                )
              )
            : null,

          // 本文
          h('main', { className: 'px-5 pt-2 pb-4', style: { flex: 1 } }, renderStep()),

          // フッター（ナビ）
          !isComplete
            ? h('footer', {
                className: 'px-5 py-4 flex items-center gap-3',
                style: { position: 'sticky', bottom: 0, backgroundColor: C.base, borderTop: '1px solid ' + C.border },
              },
                stepIndex > 0
                  ? h('button', {
                      type: 'button', onClick: back,
                      className: 'flex items-center justify-center gap-1 rounded-xl active:scale-[0.98] transition-all',
                      style: { padding: '14px 18px', color: C.text, border: '1.5px solid ' + C.border, backgroundColor: 'transparent', fontSize: '0.9375rem' },
                    },
                      h(Icon, { name: 'chevron-left', size: 18, color: C.text }), '戻る')
                  : null,
                // 来店種別は自動遷移のため次へボタン非表示
                step !== 'visitType'
                  ? h('button', {
                      type: 'button', onClick: next, disabled: !isValid(step),
                      className: 'flex-1 flex items-center justify-center gap-2 rounded-xl active:scale-[0.98] transition-all',
                      style: {
                        padding: '14px', fontWeight: 700, fontSize: '1rem',
                        backgroundColor: isValid(step) ? C.gold : C.border,
                        color: isValid(step) ? '#1a1a1a' : C.muted,
                        cursor: isValid(step) ? 'pointer' : 'not-allowed',
                      },
                    },
                      (editingFromReview && step !== 'review'
                        ? '確認に戻る'
                        : step === 'review' ? 'この内容で進む'
                        : step === 'styleImage' ? '確認へ進む' : '次へ'),
                      h(Icon, { name: 'arrow-right', size: 18, color: isValid(step) ? '#1a1a1a' : C.muted }))
                  : null
              )
            : null
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(h(App));
  </script>
</body>
</html>
